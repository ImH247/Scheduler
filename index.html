    function getWeekStart(d){const x=new Date(d);const w=x.getDay();x.setDate(x.getDate()+(w===0?-6:1-w));x.setHours(0,0,0,0);return x;}
    function fmtWK(d){return d.toISOString().split("T")[0];}
    function fmtDK(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
    function s2d(s){const h=Math.floor(s/2),m=s%2===0?"00":"30";return h>=24?`(+1) ${String(h-24).padStart(2,"0")}:${m}`:`${String(h).padStart(2,"0")}:${m}`;}
    function t2s(t){const[h,m]=t.split(":").map(Number);return h*2+(m>=30?1:0);}
    function calcDD(t){const a=new Date(t);a.setHours(0,0,0,0);const n=new Date();n.setHours(0,0,0,0);return Math.ceil((a-n)/(864e5));}
    function hexRGBA(hex,a){const h=hex.replace("#","");const r=parseInt(h.substring(0,2),16),g=parseInt(h.substring(2,4),16),b=parseInt(h.substring(4,6),16);return `rgba(${r},${g},${b},${a})`;}
    function hexDarken(hex,amt){const h=hex.replace("#","");const r=Math.max(0,parseInt(h.substring(0,2),16)-amt),g=Math.max(0,parseInt(h.substring(2,4),16)-amt),b=Math.max(0,parseInt(h.substring(4,6),16)-amt);return `rgb(${r},${g},${b})`;}

    const CLOUD_KEY_LS="ws_cloud_apikey",CLOUD_BIN_LS="ws_cloud_binid";
    const ALL_KEYS=[STORAGE_KEY,FIXED_KEY,TODO_KEY,DAILY_TPL_KEY,DAILY_CHK_KEY,DDAY_KEY,DARK_KEY,CHAT_KEY];
    (function(){try{var h=location.hash;if(h.startsWith("#sync=")){var d=atob(h.slice(6)),s=d.indexOf(":");if(s>0){localStorage.setItem(CLOUD_KEY_LS,d.slice(0,s));localStorage.setItem(CLOUD_BIN_LS,d.slice(s+1));}}}catch(e){}})();
    function makeSyncURL(){var k=localStorage.getItem(CLOUD_KEY_LS),b=localStorage.getItem(CLOUD_BIN_LS);return k&&b?location.origin+location.pathname+"#sync="+btoa(k+":"+b):null;}
    var _st=null;
    function cloudPush(){clearTimeout(_st);_st=setTimeout(async function(){var k=localStorage.getItem(CLOUD_KEY_LS),b=localStorage.getItem(CLOUD_BIN_LS);if(!k||!b)return;var blob={};ALL_KEYS.forEach(function(x){var v=localStorage.getItem(x);if(v)blob[x]=v;});try{await fetch("https://api.jsonbin.io/v3/b/"+b,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":k},body:JSON.stringify(blob)});window._lastSync=new Date().toLocaleTimeString();window.dispatchEvent(new Event("sync-done"));}catch(e){}},1500);}
    async function cloudPull(){var k=localStorage.getItem(CLOUD_KEY_LS),b=localStorage.getItem(CLOUD_BIN_LS);if(!k||!b)return false;try{var r=await fetch("https://api.jsonbin.io/v3/b/"+b+"/latest",{headers:{"X-Master-Key":k}});var j=await r.json();if(j.record){Object.entries(j.record).forEach(function(e){localStorage.setItem(e[0],e[1]);});return true;}}catch(e){}return false;}
    async function cloudInit(apiKey){try{var r=await fetch("https://api.jsonbin.io/v3/b",{method:"POST",headers:{"Content-Type":"application/json","X-Master-Key":apiKey,"X-Bin-Name":"weekly-scheduler"},body:JSON.stringify({_init:true})});var j=await r.json();if(j.metadata&&j.metadata.id){localStorage.setItem(CLOUD_KEY_LS,apiKey);localStorage.setItem(CLOUD_BIN_LS,j.metadata.id);cloudPush();return j.metadata.id;}}catch(e){}return null;}

    const sto={
      get(k){try{const v=localStorage.getItem(k);return v?{value:v}:null;}catch(_){return null;}},
      set(k,v){try{localStorage.setItem(k,v);cloudPush();}catch(_){}}
    };

    /* ===== Schedule conflict detection & auto-arrangement ===== */
    function overlap(a,b){return a.day===b.day && !(a.endSlot<=b.startSlot || a.startSlot>=b.endSlot);}
    function findConflicts(target,list,excludeId){
      return list.filter(s=>s.id!==excludeId && overlap(target,s));
    }
    // Find next free slot for an onetime schedule on a given day, given duration and other schedules
    function findFreeSlotOnDay(day,duration,others,preferredStart){
      const dayItems=others.filter(s=>s.day===day).sort((a,b)=>a.startSlot-b.startSlot);
      const trySlot=(start)=>{
        if(start+duration>END_SLOT)return false;
        return !dayItems.some(s=>!(start+duration<=s.startSlot || start>=s.endSlot));
      };
      // 1) try preferredStart and forward
      const ps=Math.max(preferredStart||START_SLOT,START_SLOT);
      for(let s=ps;s+duration<=END_SLOT;s++){if(trySlot(s))return s;}
      // 2) fall back: scan from START_SLOT
      for(let s=START_SLOT;s<ps;s++){if(trySlot(s))return s;}
      return null;
    }
    // Re-arrange one-time schedules so they don't conflict with each other or with fixed.
    // Fixed schedules stay put; one-time schedules may shift to find a free slot on the same day.
    function autoArrangeOneTime(allSchedules){
      const fixed=allSchedules.filter(s=>s.type==="fixed");
      const onetime=allSchedules.filter(s=>s.type!=="fixed").slice()
        .sort((a,b)=>{
          // higher priority first, older createdAt first
          const pa=a.priority==="high"?0:a.priority==="medium"?1:2;
          const pb=b.priority==="high"?0:b.priority==="medium"?1:2;
          if(pa!==pb)return pa-pb;
          return (a.createdAt||0)-(b.createdAt||0);
        });
      const placed=[...fixed];
      const moved=[];
      onetime.forEach(s=>{
        const dur=s.endSlot-s.startSlot;
        // If already conflict-free, keep
        const conflicts=findConflicts(s,placed);
        if(conflicts.length===0){placed.push(s);return;}
        // Try to find a new slot on the same day
        const newStart=findFreeSlotOnDay(s.day,dur,placed,s.startSlot);
        if(newStart!==null){
          const moved1={...s,startSlot:newStart,endSlot:newStart+dur};
          placed.push(moved1);
          if(newStart!==s.startSlot)moved.push({name:s.name,from:s.startSlot,to:newStart,day:s.day});
        } else {
          // try other days (same weekday range), keep original day priority
          let found=false;
          for(let d=0;d<7;d++){
            if(d===s.day)continue;
            const ns=findFreeSlotOnDay(d,dur,placed,s.startSlot);
            if(ns!==null){
              const moved2={...s,day:d,startSlot:ns,endSlot:ns+dur};
              placed.push(moved2);
              moved.push({name:s.name,from:s.startSlot,to:ns,day:d,dayChanged:true,oldDay:s.day});
              found=true;break;
            }
          }
          if(!found)placed.push(s); // give up, keep original (overlap remains)
        }
      });
      return {schedules:placed,moved};
    }

    /* ===== AI integration (OpenAI) ===== */
    function buildAIContext(state){
      const {schedules,fixedList,todos,dailyTpls,ddays,weekKey,weekDates,today}=state;
      const todayIdx=(today.getDay()+6)%7;
      const sLines=schedules.slice().sort((a,b)=>a.day-b.day||a.startSlot-b.startSlot)
        .map(s=>`- [${s.type==="fixed"?"고정":"임시"}] ${DAYS[s.day]}요일 ${s2d(s.startSlot)}-${s2d(s.endSlot)} : ${s.name}${s.memo?` (메모: ${s.memo})`:""}${s.priority?` (우선순위:${s.priority})`:""}`)
        .join("\n")||"(없음)";
      const tLines=todos.filter(t=>!t.done).map(t=>`- ${t.text}`).join("\n")||"(없음)";
      const dLines=ddays.map(d=>{const diff=calcDD(d.date);return `- ${d.title} (${d.date}, ${diff>0?`D-${diff}`:diff===0?"D-Day":`D+${Math.abs(diff)}`})`;}).join("\n")||"(없음)";
      return `# 현재 컨텍스트
- 오늘: ${fmtDK(today)} (${DAYS[todayIdx]}요일)
- 이번 주: ${weekKey} (월요일 시작)
- 주간 날짜: ${weekDates.map((d,i)=>`${DAYS[i]}=${fmtDK(d)}`).join(", ")}

# 시간 슬롯 규약
- 슬롯은 30분 단위. 슬롯 16 = 08:00, 슬롯 36 = 18:00, 슬롯 48 = 다음날 00:00.
- 사용 가능 범위: startSlot/endSlot 모두 ${START_SLOT}~${END_SLOT}.
- day: 0=월,1=화,2=수,3=목,4=금,5=토,6=일

# 현재 일정
${sLines}

# 미완료 To Do
${tLines}

# D-Day 목록
${dLines}`;
    }
    const AI_SYSTEM_PROMPT=`당신은 정민혁님의 주간 일정 비서입니다. 사용자가 한국어로 일정/할일을 입력하면 컨텍스트(현재 일정, D-Day, 오늘 날짜)를 고려해 우선순위와 시간 블록을 제안하고 JSON으로 응답합니다.

# 응답 형식 (반드시 JSON object, 다른 텍스트 금지)
{
  "message": "사용자에게 보여줄 자연스러운 한국어 답변 (2-4문장)",
  "actions": [
    // 0개 이상의 액션 객체. 사용자가 일정 추가를 명시적으로 요청했거나 명백히 의도한 경우에만.
    {"type":"add_schedule","name":"활동명","day":0,"startSlot":32,"endSlot":36,"scheduleType":"onetime","priority":"high","memo":""}
    // 또는 {"type":"add_todo","text":"..."}
    // 또는 {"type":"remove_schedule","scheduleName":"..."}  // 정확히 일치하는 이름의 일정 삭제
  ]
}

# 규칙
- 단순 질문/조언 요청이면 actions는 빈 배열 [].
- 일정 추가 시: scheduleType은 "fixed"(매주 반복) 또는 "onetime"(이번 주만, 자동 재배치 가능). 사용자가 "매주", "고정"이라 명시하지 않으면 onetime.
- priority는 "high"|"medium"|"low". D-Day 임박, 시험/마감, 사용자가 "급함/중요"라고 표현하면 high.
- startSlot < endSlot, 둘 다 ${START_SLOT}~${END_SLOT} 범위. 30분 미만 일정 금지(최소 endSlot=startSlot+1).
- day는 사용자 표현 기준: "내일", "다음주 월요일" 등은 컨텍스트의 오늘 날짜로 계산해 0-6 중 하나.
- 고정 일정과 시간 충돌은 피하되, 임시 일정 충돌은 시스템이 자동 재배치하므로 그냥 사용자 의도대로 제시.
- 여러 일정을 한 번에 요청하면 actions에 여러 개 담기.
- 색상은 지정하지 않음 (시스템이 자동 부여).
- message는 무엇을 했는지/제안하는지 명확히 알리고, 우선순위 근거가 있으면 짧게 설명.`;

    function getAIProvider(model){
      if(model&&model.startsWith("claude-"))return "anthropic";
      return "openai";
    }

    async function callOpenAI(apiKey,model,history,userMsg,contextText){
      const messages=[
        {role:"system",content:AI_SYSTEM_PROMPT},
        {role:"system",content:contextText},
        ...history.slice(-8).filter(m=>m.role==="user"||m.role==="assistant").map(m=>({role:m.role,content:m.role==="assistant"?(m.raw||m.content):m.content})),
        {role:"user",content:userMsg}
      ];
      const body={model:model||"gpt-4o-mini",messages,response_format:{type:"json_object"}};
      // GPT-5 reasoning 시리즈는 temperature를 default(=1)로 두는 것이 안전
      if(!/^(gpt-5|chat-latest)/.test(model||""))body.temperature=0.4;
      const res=await fetch("https://api.openai.com/v1/chat/completions",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},
        body:JSON.stringify(body)
      });
      if(!res.ok){const t=await res.text();throw new Error(`OpenAI ${res.status}: ${t.slice(0,200)}`);}
      const j=await res.json();
      const raw=j.choices?.[0]?.message?.content||"{}";
      let parsed;try{parsed=JSON.parse(raw);}catch(e){parsed={message:raw,actions:[]};}
      return {raw,parsed};
    }

    async function callAnthropic(apiKey,model,history,userMsg,contextText){
      const sys=AI_SYSTEM_PROMPT+"\n\n"+contextText+"\n\n[중요] 반드시 유효한 JSON object 하나만 응답하세요. 코드펜스(```)나 추가 설명 없이 '{' 로 시작해 '}' 로 끝나야 합니다.";
      const msgs=[
        ...history.slice(-8).filter(m=>m.role==="user"||m.role==="assistant").map(m=>({role:m.role,content:m.role==="assistant"?(m.raw||m.content):m.content})),
        {role:"user",content:userMsg}
      ];
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key":apiKey,
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true"
        },
        body:JSON.stringify({model,max_tokens:2048,system:sys,messages:msgs,temperature:0.4})
      });
      if(!res.ok){const t=await res.text();throw new Error(`Anthropic ${res.status}: ${t.slice(0,200)}`);}
      const j=await res.json();
      const raw=(j.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      // Extract first JSON object if there's wrapping text
      let jsonStr=raw;const mm=raw.match(/\{[\s\S]*\}/);if(mm)jsonStr=mm[0];
      let parsed;try{parsed=JSON.parse(jsonStr);}catch(e){parsed={message:raw,actions:[]};}
      return {raw,parsed};
    }

    async function callAI(model,history,userMsg,contextText){
      const provider=getAIProvider(model);
      if(provider==="anthropic"){
        const k=localStorage.getItem(AI_ANT_KEY_LS);
        if(!k)throw new Error("Anthropic API 키가 설정되지 않았습니다. ⚙️ 설정에서 키를 입력하세요.");
        return callAnthropic(k,model,history,userMsg,contextText);
      } else {
        const k=localStorage.getItem(AI_KEY_LS);
        if(!k)throw new Error("OpenAI API 키가 설정되지 않았습니다. ⚙️ 설정에서 키를 입력하세요.");
        return callOpenAI(k,model,history,userMsg,contextText);
      }
    }

    /* ===== Calendar + D-Day ===== */
    function CalendarPanel(){
      const today=new Date();
      const [vY,sY]=useState(today.getFullYear());
      const [vM,sM]=useState(today.getMonth());
      const [ddays,setDdays]=useState([]);
      const [ddF,setDdF]=useState({title:"",date:""});
      const [showF,setShowF]=useState(false);

      useEffect(()=>{const r=sto.get(DDAY_KEY);if(r)setDdays(JSON.parse(r.value));},[]);
      function saveDD(l){setDdays(l);sto.set(DDAY_KEY,JSON.stringify(l));}
      function addDD(){if(!ddF.title.trim()||!ddF.date)return;saveDD([...ddays,{id:Date.now(),title:ddF.title.trim(),date:ddF.date}]);setDdF({title:"",date:""});setShowF(false);}
      function delDD(id){saveDD(ddays.filter(d=>d.id!==id));}

      const first=new Date(vY,vM,1);
      const sDow=(first.getDay()+6)%7;
      const dim=new Date(vY,vM+1,0).getDate();
      const cells=[];for(let i=0;i<sDow;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(d);while(cells.length%7)cells.push(null);
      const isCur=vY===today.getFullYear()&&vM===today.getMonth();

      return (
        <div style={{padding:"12px 12px",background:"var(--bg3)",display:"flex",flexDirection:"column",gap:"10px",overflowY:"auto",height:"100%"}}>
          {/* Calendar block */}
          <div style={{background:"var(--bg1)",borderRadius:"14px",padding:"14px 12px",border:"1px solid var(--bd3)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}}>
              <button onClick={()=>{if(vM===0){sY(vY-1);sM(11);}else sM(vM-1);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:"12px",color:"var(--tx2)",padding:"4px 6px",lineHeight:1}}>◀</button>
              <span onClick={()=>{sY(today.getFullYear());sM(today.getMonth());}} style={{fontSize:"13px",fontWeight:"700",color:"var(--tx1)",cursor:"pointer",letterSpacing:"-0.01em"}}>{vY}년 {MO[vM]}</span>
              <button onClick={()=>{if(vM===11){sY(vY+1);sM(0);}else sM(vM+1);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:"12px",color:"var(--tx2)",padding:"4px 6px",lineHeight:1}}>▶</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"1px",textAlign:"center"}}>

      function tog(id){const n={...ch,[id]:!ch[id]};setCh(n);sto.set(DAILY_CHK_KEY,JSON.stringify({dateKey:tk,checks:n}));}

          <div style={{height:"3px",background:"var(--bg2)",borderRadius:"2px",marginTop:"6px",overflow:"hidden"}}>

          </div>))}

    /* ===== TODO Panel ===== */
    function TodoPanel({tpls,setTpls}){
      const [todos,setTodos]=useState([]);const [nw,setNw]=useState("");const [eId,setEId]=useState(null);const [eT,setET]=useState("");const iR=useRef(null);
      useEffect(()=>{const r1=sto.get(TODO_KEY);if(r1)setTodos(JSON.parse(r1.value));},[]);
      function sT(l){setTodos(l);sto.set(TODO_KEY,JSON.stringify(l));}
      function add(){if(!nw.trim())return;sT([...todos,{id:Date.now()+Math.random(),text:nw.trim(),done:false,color:TC[todos.length%TC.length]}]);setNw("");iR.current?.focus();}
      function tog(id){sT(todos.map(t=>t.id===id?{...t,done:!t.done}:t));}
      function del(id){sT(todos.filter(t=>t.id!==id));setTpls(tpls.filter(t=>t.id!==id));}
      function sE(id){if(!eT.trim())return;sT(todos.map(t=>t.id===id?{...t,text:eT.trim()}:t));setEId(null);}
      function clr(){const ids=new Set(todos.filter(t=>t.done).map(t=>t.id));sT(todos.filter(t=>!t.done));setTpls(tpls.filter(t=>!ids.has(t.id)));}
      function aD(t){if(tpls.some(x=>x.id===t.id))return;setTpls([...tpls,{id:t.id,text:t.text,color:t.color}]);}
      const isD=id=>tpls.some(t=>t.id===id);const act=todos.filter(t=>!t.done),dn=todos.filter(t=>t.done);
      return (<div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
        <div style={{padding:"10px 14px 10px",borderBottom:"1px solid var(--bd3)"}}>
          <p style={{fontSize:"10px",color:"var(--tx3)",margin:0,letterSpacing:"0.04em",fontWeight:"600"}}>{"TODO · "+act.length+(dn.length>0?" 남음 / "+dn.length+" 완료":" 남음")}</p>
        </div>
        <div style={{padding:"8px 12px",borderBottom:"1px solid var(--bd3)",display:"flex",gap:"6px"}}>
          <input ref={iR} style={{flex:1,padding:"7px 10px",border:"1px solid var(--bd3)",borderRadius:"7px",fontSize:"12px",background:"var(--bg2)",color:"var(--tx1)",outline:"none",transition:"border 0.15s"}} placeholder="할 일 입력..." value={nw} onChange={e=>setNw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}/>
          <button onClick={add} style={{padding:"7px 13px",background:"var(--accent)",color:"white",border:"none",borderRadius:"7px",fontSize:"12px",fontWeight:"600",cursor:"pointer",opacity:nw.trim()?1:0.4,whiteSpace:"nowrap"}} disabled={!nw.trim()}>추가</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"6px 12px"}}>
          {act.length===0&&dn.length===0&&<div style={{textAlign:"center",padding:"28px 10px",color:"var(--tx3)",fontSize:"11px"}}>할 일을 추가해 보세요</div>}
          {act.map(t=>(<div key={t.id} style={{display:"flex",alignItems:"center",gap:"8px",padding:"7px 4px",borderBottom:"1px solid var(--bd3)"}}>
            <div onClick={()=>tog(t.id)} style={{width:"18px",height:"18px",borderRadius:"50%",border:`2px solid ${t.color}`,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}/>
            {eId===t.id?<input style={{flex:1,padding:"3px 6px",border:"1px solid var(--accent)",borderRadius:"4px",fontSize:"12px",background:"var(--bg2)",color:"var(--tx1)",outline:"none"}} value={eT} onChange={e=>setET(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")sE(t.id);if(e.key==="Escape")setEId(null);}} onBlur={()=>sE(t.id)} autoFocus/>
            :<span onDoubleClick={()=>{setEId(t.id);setET(t.text);}} style={{flex:1,fontSize:"12px",color:"var(--tx1)",cursor:"default",lineHeight:1.4,wordBreak:"break-word"}}>{t.text}</span>}
            <button onClick={()=>aD(t)} title={isD(t.id)?"Daily 등록됨":"Daily에 추가"} style={{background:isD(t.id)?"#F59E0B":"transparent",border:isD(t.id)?"none":"1px solid var(--bd2)",color:isD(t.id)?"white":"var(--tx3)",fontSize:"9px",fontWeight:"700",cursor:isD(t.id)?"default":"pointer",padding:"3px 7px",borderRadius:"5px",flexShrink:0,lineHeight:1.3,letterSpacing:"0.02em"}}>Daily</button>
            <button onClick={()=>del(t.id)} style={{background:"none",border:"none",color:"var(--tx3)",fontSize:"12px",cursor:"pointer",padding:"2px 3px",flexShrink:0,lineHeight:1,opacity:0.5}}>✕</button>
          </div>))}
          {dn.length>0&&<div style={{marginTop:"10px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 4px"}}><span style={{fontSize:"10px",fontWeight:"600",color:"var(--tx3)",letterSpacing:"0.04em"}}>{"DONE · "+dn.length}</span><button onClick={clr} style={{background:"none",border:"none",color:"#F76B4F",fontSize:"10px",cursor:"pointer",padding:"2px 4px",fontWeight:"600"}}>모두 지우기</button></div>
            {dn.map(t=>(<div key={t.id} style={{display:"flex",alignItems:"center",gap:"8px",padding:"6px 4px",borderBottom:"1px solid var(--bd3)",opacity:0.45}}>
              <div onClick={()=>tog(t.id)} style={{width:"18px",height:"18px",borderRadius:"50%",background:t.color,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",color:"white"}}>✓</div>
              <span style={{flex:1,fontSize:"12px",color:"var(--tx3)",textDecoration:"line-through",wordBreak:"break-word"}}>{t.text}</span>
              <button onClick={()=>del(t.id)} style={{background:"none",border:"none",color:"var(--tx3)",fontSize:"12px",cursor:"pointer",padding:"2px 3px",flexShrink:0,lineHeight:1}}>✕</button>
            </div>))}
          </div>}
        </div>
      </div>);
    }

    /* ===== AI Chat Panel ===== */
    function AIChatPanel({contextRef,onActions,openSettings,settingsTick}){
      const [history,setHistory]=useState([]);
      const [input,setInput]=useState("");
      const [loading,setLoading]=useState(false);
      const [err,setErr]=useState("");
      const scRef=useRef(null);
      // Re-read on every render so settings changes immediately reflect (cheap localStorage reads)
      const oaiKey=localStorage.getItem(AI_KEY_LS)||"";
      const antKey=localStorage.getItem(AI_ANT_KEY_LS)||"";
      const model=localStorage.getItem(AI_MODEL_LS)||"gpt-4o-mini";
      const provider=getAIProvider(model);
      const hasKey=provider==="anthropic"?!!antKey:!!oaiKey;
      const providerLabel=provider==="anthropic"?"Claude":"GPT";

      useEffect(()=>{const r=sto.get(CHAT_KEY);if(r){try{setHistory(JSON.parse(r.value));}catch(_){}}},[]);
      useEffect(()=>{if(scRef.current)scRef.current.scrollTop=scRef.current.scrollHeight;},[history,loading]);

      function saveH(l){setHistory(l);sto.set(CHAT_KEY,JSON.stringify(l));}
      function clearH(){if(confirm("대화 기록을 모두 삭제할까요?"))saveH([]);}

      async function send(){
        if(!input.trim()||loading)return;
        if(!hasKey){setErr(`${provider==="anthropic"?"Anthropic":"OpenAI"} API 키를 먼저 설정해주세요.`);openSettings();return;}
        const userMsg={role:"user",content:input.trim(),ts:Date.now()};
        const newH=[...history,userMsg];saveH(newH);
        setInput("");setLoading(true);setErr("");
        try{
          const ctx=contextRef.current?contextRef.current():"";
          const {raw,parsed}=await callAI(model,history,userMsg.content,ctx);
          const aiMsg={role:"assistant",content:parsed.message||"(응답 없음)",raw,actions:parsed.actions||[],ts:Date.now()};
          const after=[...newH,aiMsg];saveH(after);
          if(parsed.actions&&parsed.actions.length>0){
            const result=onActions(parsed.actions);
            if(result&&result.length>0){
              const sysMsg={role:"system",content:result.join("\n"),ts:Date.now()};
              saveH([...after,sysMsg]);
            }
          }
        }catch(e){setErr(e.message||"요청 실패");const errMsg={role:"system",content:`⚠️ ${e.message||"요청 실패"}`,ts:Date.now()};saveH([...newH,errMsg]);}
        finally{setLoading(false);}
      }

      return (<div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
        <div style={{padding:"10px 14px 10px",borderBottom:"1px solid var(--bd3)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:"7px"}}>
            <div style={{width:"6px",height:"6px",borderRadius:"50%",background:hasKey?"#20C997":"var(--tx3)",boxShadow:hasKey?"0 0 0 2px rgba(32,201,151,0.18)":"none"}}/>
            <p style={{fontSize:"10px",color:"var(--tx3)",margin:0,letterSpacing:"0.04em",fontWeight:"600"}}>{hasKey?providerLabel.toUpperCase()+" · "+model:"AI · 키 미설정"}</p>
          </div>
          <div style={{display:"flex",gap:"4px"}}>
            <button onClick={openSettings} title="설정" style={{background:"transparent",border:"1px solid var(--bd3)",borderRadius:"6px",padding:"3px 7px",fontSize:"11px",cursor:"pointer",color:"var(--tx2)"}}>⚙</button>
            <button onClick={clearH} title="대화 초기화" style={{background:"transparent",border:"1px solid var(--bd3)",borderRadius:"6px",padding:"3px 7px",fontSize:"11px",cursor:"pointer",color:"var(--tx2)"}}>↺</button>
          </div>
        </div>
        <div ref={scRef} style={{flex:1,overflowY:"auto",padding:"10px 12px",display:"flex",flexDirection:"column",gap:"8px"}}>
          {history.length===0&&<div style={{textAlign:"center",padding:"16px 8px",color:"var(--tx3)",fontSize:"11px",lineHeight:1.7}}>
            <div style={{fontSize:"22px",marginBottom:"8px",opacity:0.5}}>✦</div>
            <p style={{margin:"0 0 12px",fontWeight:"500",color:"var(--tx2)"}}>일정·할 일을 자연어로 말해보세요</p>
            <span style={{display:"block",background:"var(--bg2)",padding:"7px 10px",borderRadius:"7px",margin:"4px 0",textAlign:"left",fontSize:"11px",color:"var(--tx2)",border:"1px solid var(--bd3)"}}>"내일 오후 3시에 1시간 미팅"</span>
            <span style={{display:"block",background:"var(--bg2)",padding:"7px 10px",borderRadius:"7px",margin:"4px 0",textAlign:"left",fontSize:"11px",color:"var(--tx2)",border:"1px solid var(--bd3)"}}>"이번 주 시험공부 6시간 분배"</span>
            <span style={{display:"block",background:"var(--bg2)",padding:"7px 10px",borderRadius:"7px",margin:"4px 0",textAlign:"left",fontSize:"11px",color:"var(--tx2)",border:"1px solid var(--bd3)"}}>"오늘 우선순위 정리해줘"</span>
          </div>}
          {history.map((m,i)=>{
            if(m.role==="user")return <div key={i} style={{alignSelf:"flex-end",maxWidth:"85%",background:"var(--accent)",color:"white",padding:"8px 12px",borderRadius:"14px 14px 4px 14px",fontSize:"12px",lineHeight:1.5,whiteSpace:"pre-wrap",wordBreak:"break-word",letterSpacing:"-0.01em"}}>{m.content}</div>;
            if(m.role==="assistant")return <div key={i} style={{alignSelf:"flex-start",maxWidth:"90%",background:"var(--bg2)",color:"var(--tx1)",padding:"8px 12px",borderRadius:"14px 14px 14px 4px",fontSize:"12px",lineHeight:1.5,whiteSpace:"pre-wrap",wordBreak:"break-word",border:"1px solid var(--bd3)",letterSpacing:"-0.01em"}}>{m.content}</div>;
            return <div key={i} style={{alignSelf:"center",maxWidth:"95%",fontSize:"10px",color:"var(--tx3)",padding:"5px 10px",background:"var(--bg2)",borderRadius:"7px",whiteSpace:"pre-wrap",lineHeight:1.5,textAlign:"center",border:"1px solid var(--bd3)"}}>{m.content}</div>;
          })}
          {loading&&<div style={{alignSelf:"flex-start",background:"var(--bg2)",padding:"8px 12px",borderRadius:"14px",fontSize:"12px",color:"var(--tx2)",border:"1px solid var(--bd3)",display:"flex",gap:"4px",alignItems:"center"}}><span className="ai-pulse">●</span><span style={{fontSize:"11px"}}>응답 중...</span></div>}
        </div>
        <div style={{padding:"8px 12px 10px",borderTop:"1px solid var(--bd3)",background:"var(--bg2)"}}>
          <div style={{display:"flex",gap:"6px",alignItems:"flex-end"}}>
            <textarea
              value={input}
              onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
              placeholder="메시지 입력 · Shift+Enter 줄바꿈"
              rows={2}
              style={{flex:1,padding:"8px 10px",border:"1px solid var(--bd3)",borderRadius:"8px",fontSize:"12px",background:"var(--bg1)",color:"var(--tx1)",outline:"none",resize:"none",fontFamily:"inherit",lineHeight:1.4}}
            />
            <button onClick={send} disabled={!input.trim()||loading} style={{padding:"8px 12px",background:"var(--accent)",color:"white",border:"none",borderRadius:"8px",fontSize:"14px",fontWeight:"700",cursor:input.trim()&&!loading?"pointer":"not-allowed",opacity:input.trim()&&!loading?1:0.4,whiteSpace:"nowrap",alignSelf:"stretch",minWidth:"38px"}}>↑</button>
          </div>
          {err&&<p style={{fontSize:"10px",color:"#F76B4F",margin:"4px 0 0"}}>{err}</p>}
        </div>
      </div>);
    }

          <div style={{flex:1,minHeight:0,display:"flex",flexDirection:"column",borderTop:"1px solid var(--bd3)"}}>

            {stab==="daily"&&<DailyCheckPanel templates={tpls} onRemove={rD}/>}
          </div>
        </div>
        {/* AI block (independent) */}
        <div style={{flex:"1 1 50%",minHeight:0,background:"var(--bg1)",borderRadius:"14px",border:"1px solid var(--bd3)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <AIChatPanel contextRef={contextRef} onActions={onAIActions} openSettings={openAISettings}/>
        </div>
      </div>);
    }

                  <span style={{fontSize:"12px",fontWeight:"500",color:i===5?"#06B6D4":i===6?"#F76B4F":"var(--tx2)"}}>{d}</span>

            </div>

          {/* Timetable body */}
          <div style={{display:"flex"}}>
            <div style={{width:"56px",flexShrink:0,position:"relative",height:totalH,background:"var(--bg1)",borderRight:"0.5px solid var(--bd3)"}}>

                      onMouseEnter={e=>e.currentTarget.style.background="rgba(79,124,247,0.06)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"} />

              <div style={{background:"var(--bg1)",borderRadius:"16px",padding:"22px",width:"100%",maxWidth:"420px",border:"1px solid var(--bd3)"}} onClick={e=>e.stopPropagation()}>
                <h2 style={{fontSize:"18px",fontWeight:"600",margin:"0 0 6px",color:"var(--tx1)"}}>{modal.mode==="add"?"고정 일정 추가":"고정 일정 수정"}</h2>
                <label style={{fontSize:"13px",fontWeight:"500",color:"var(--tx2)",display:"block",marginTop:"10px"}}>활동명</label>
                <input style={{width:"100%",padding:"8px 12px",border:"0.5px solid var(--bd2)",borderRadius:"8px",fontSize:"14px",background:"var(--bg2)",color:"var(--tx1)",outline:"none",marginTop:"4px"}} placeholder="예: 수업, 운동..." value={form.name} onChange={e=>setForm({...form,name:e.target.value})} onKeyDown={e=>e.key==="Enter"&&(modal.mode==="add"?handleAdd():handleEdit())} autoFocus/>
                <div style={{display:"flex",gap:"12px"}}>
                  <div style={{flex:1}}><label style={{fontSize:"13px",fontWeight:"500",color:"var(--tx2)",display:"block",marginTop:"10px"}}>요일</label>
                    <select style={{width:"100%",padding:"8px 12px",border:"0.5px solid var(--bd2)",borderRadius:"8px",fontSize:"14px",background:"var(--bg2)",color:"var(--tx1)",outline:"none",marginTop:"4px",cursor:"pointer"}} value={form.day} onChange={e=>setForm({...form,day:Number(e.target.value)})}>
                      {DAYS.map((d,i)=><option key={i} value={i}>{d}요일</option>)}
                    </select></div>
                </div>
                <div style={{display:"flex",gap:"12px"}}>
                  <div style={{flex:1}}><label style={{fontSize:"13px",fontWeight:"500",color:"var(--tx2)",display:"block",marginTop:"10px"}}>시작</label>
                    <select style={{width:"100%",padding:"8px 12px",border:"0.5px solid var(--bd2)",borderRadius:"8px",fontSize:"14px",background:"var(--bg2)",color:"var(--tx1)",outline:"none",marginTop:"4px",cursor:"pointer"}} value={form.startSlot} onChange={e=>setForm({...form,startSlot:Number(e.target.value),endSlot:Math.max(Number(e.target.value)+1,Math.min(Number(e.target.value)+2,END_SLOT))})}>{timeOpts}</select></div>
                  <div style={{flex:1}}><label style={{fontSize:"13px",fontWeight:"500",color:"var(--tx2)",display:"block",marginTop:"10px"}}>종료</label>
                    <select style={{width:"100%",padding:"8px 12px",border:"0.5px solid var(--bd2)",borderRadius:"8px",fontSize:"14px",background:"var(--bg2)",color:"var(--tx1)",outline:"none",marginTop:"4px",cursor:"pointer"}} value={form.endSlot} onChange={e=>setForm({...form,endSlot:Number(e.target.value)})}>
                      {Array.from({length:END_SLOT-form.startSlot},(_,i)=>{const s=form.startSlot+1+i;return s>END_SLOT?null:<option key={i} value={s}>{s2d(s)}</option>;}).filter(Boolean)}
                    </select></div>
                </div>
                <label style={{fontSize:"13px",fontWeight:"500",color:"var(--tx2)",display:"block",marginTop:"10px"}}>색상</label>
                <div style={{display:"flex",gap:"7px",marginTop:"6px",flexWrap:"wrap"}}>
                  {COLORS.map(c=><div key={c.bg} onClick={()=>setForm({...form,color:c.bg})} style={{width:"28px",height:"28px",borderRadius:"50%",background:c.bg,cursor:"pointer",outline:form.color===c.bg?"3px solid var(--tx1)":"3px solid transparent",outlineOffset:"2px",transition:"outline 0.1s"}} title={c.label}/>)}
                </div>
                <label style={{fontSize:"13px",fontWeight:"500",color:"var(--tx2)",display:"block",marginTop:"10px"}}>📝 메모</label>
                <textarea style={{width:"100%",padding:"8px 12px",border:"0.5px solid var(--bd2)",borderRadius:"8px",fontSize:"13px",background:"var(--bg2)",color:"var(--tx1)",outline:"none",marginTop:"4px",resize:"vertical",minHeight:"50px",fontFamily:"inherit"}} value={form.memo} onChange={e=>setForm({...form,memo:e.target.value})} placeholder="메모를 입력하세요..." rows={2}/>
                <div style={{display:"flex",gap:"8px",marginTop:"16px"}}>
                  <button style={{flex:1,padding:"10px",background:"var(--bg2)",color:"var(--tx1)",border:"0.5px solid var(--bd2)",borderRadius:"8px",fontSize:"14px",cursor:"pointer"}} onClick={()=>setModal(null)}>취소</button>
                  <button style={{flex:1,padding:"10px",background:"#4F7CF7",color:"white",border:"none",borderRadius:"8px",fontSize:"14px",fontWeight:"500",cursor:"pointer",opacity:form.name.trim()?1:0.5}} onClick={modal.mode==="add"?handleAdd:handleEdit} disabled={!form.name.trim()}>{modal.mode==="add"?"추가":"저장"}</button>
                  {modal.mode==="edit"&&<button style={{flex:1,padding:"10px",background:"#F76B4F",color:"white",border:"none",borderRadius:"8px",fontSize:"14px",fontWeight:"500",cursor:"pointer"}} onClick={()=>handleDel(modal.id)}>삭제</button>}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ===== Main App ===== */
    function App(){
      const today=new Date();
      const weekStart=getWeekStart(today);
      const weekKey=fmtWK(weekStart);
      const todayIdx=(today.getDay()+6)%7;
      const weekDates=Array.from({length:7},(_,i)=>{const d=new Date(weekStart);d.setDate(d.getDate()+i);return d;});

      const [dark,setDark]=useState(()=>{const r=sto.get(DARK_KEY);return r?r.value==="1":false;});
      const [tab,setTab]=useState("weekly"); // "weekly" | "fixed"
      const [schedules,setSchedules]=useState([]);
      const [fixedList,setFixedList]=useState([]);
      const [loaded,setLoaded]=useState(false);
      const [modal,setModal]=useState(null);
      const [form,setForm]=useState({name:"",startSlot:16,endSlot:18,type:"fixed",color:COLORS[0].bg,memo:""});
      const [hovId,setHovId]=useState(null);
      const [hovCell,setHovCell]=useState(null);
      const sRef=useRef(null);
      const [isMobile,setIsMobile]=useState(window.innerWidth<768);
      const [mobileView,setMobileView]=useState("timetable");
      const [cloudModal,setCloudModal]=useState(false);
      const [cloudKey,setCloudKey]=useState(localStorage.getItem(CLOUD_KEY_LS)||"");
      const [cloudBin,setCloudBin]=useState(localStorage.getItem(CLOUD_BIN_LS)||"");
      const [syncMsg,setSyncMsg]=useState("");
      const [cloudReady,setCloudReady]=useState(false);
      const [aiModal,setAiModal]=useState(false);
      const [aiKey,setAiKey]=useState(localStorage.getItem(AI_KEY_LS)||"");
      const [aiAntKey,setAiAntKey]=useState(localStorage.getItem(AI_ANT_KEY_LS)||"");
      const [aiModel,setAiModel]=useState(localStorage.getItem(AI_MODEL_LS)||"gpt-4o-mini");
      const [ddays,setDdays]=useState([]);
      const [todosList,setTodosList]=useState([]);
      const [dailyTpls,setDailyTpls]=useState([]);
      const ctxRef=useRef(null);

      useEffect(function(){
        var h=function(){setSyncMsg("✓ "+window._lastSync);};
        var r=function(){setIsMobile(window.innerWidth<768);};
        window.addEventListener("sync-done",h);
        window.addEventListener("resize",r);
        return function(){window.removeEventListener("sync-done",h);window.removeEventListener("resize",r);};
      },[]);

      useEffect(function(){
        (async function(){
          if(localStorage.getItem(CLOUD_KEY_LS)&&localStorage.getItem(CLOUD_BIN_LS)){
            setSyncMsg("동기화 중...");
            await cloudPull();
            setSyncMsg("✓ 불러옴");
          }
          setCloudReady(true);
        })();
      },[]);

      useEffect(()=>{document.documentElement.className=dark?"dark":"";sto.set(DARK_KEY,dark?"1":"0");},[dark]);

      // Load fixed schedules
      useEffect(()=>{
        if(!cloudReady) return;
        const rf=sto.get(FIXED_KEY);
        const fixed=rf?JSON.parse(rf.value):[];
        setFixedList(fixed);

        // Load weekly schedules & auto-populate fixed ones
        const rw=sto.get(STORAGE_KEY);
        let weekly=rw?JSON.parse(rw.value):[];

        // Remove expired one-time schedules (different weekKey)
        weekly=weekly.filter(s=>s.type==="fixed"||s.weekKey===weekKey);

        // Sync fixed schedules into weekly: replace all fixed entries with current fixed list
        const oneTimeOnly=weekly.filter(s=>s.type!=="fixed");
        const fixedAsWeekly=fixed.map(f=>({...f,type:"fixed",weekKey}));
        const merged=[...oneTimeOnly,...fixedAsWeekly];

        setSchedules(merged);
        sto.set(STORAGE_KEY,JSON.stringify(merged));
        setLoaded(true);
      },[cloudReady]);

      useEffect(()=>{
        if(sRef.current&&tab==="weekly"){
          const off=(t2s("08:00")-START_SLOT)*SLOT_H;
          const top=sRef.current.getBoundingClientRect().top+window.scrollY;
          window.scrollTo({top:top+off-60,behavior:"auto"});
        }
      },[loaded,tab]);

      function saveSch(l){setSchedules(l);sto.set(STORAGE_KEY,JSON.stringify(l));}
      function saveFixed(l){
        setFixedList(l);sto.set(FIXED_KEY,JSON.stringify(l));
        // Also sync to weekly view
        const oneTime=schedules.filter(s=>s.type!=="fixed");
        const fixedW=l.map(f=>({...f,type:"fixed",weekKey}));
        const merged=[...oneTime,...fixedW];
        setSchedules(merged);sto.set(STORAGE_KEY,JSON.stringify(merged));
      }

      // Keep AI context state in sync
      useEffect(()=>{
        const r=sto.get(DDAY_KEY);if(r){try{setDdays(JSON.parse(r.value));}catch(_){}}
        const r2=sto.get(TODO_KEY);if(r2){try{setTodosList(JSON.parse(r2.value));}catch(_){}}
        const r3=sto.get(DAILY_TPL_KEY);if(r3){try{setDailyTpls(JSON.parse(r3.value));}catch(_){}}
        // Listen for storage updates from sibling panels
        const handler=()=>{
          const a=sto.get(DDAY_KEY);if(a){try{setDdays(JSON.parse(a.value));}catch(_){}}
          const b=sto.get(TODO_KEY);if(b){try{setTodosList(JSON.parse(b.value));}catch(_){}}
          const c=sto.get(DAILY_TPL_KEY);if(c){try{setDailyTpls(JSON.parse(c.value));}catch(_){}}
        };
        window.addEventListener("storage",handler);
        const tick=setInterval(handler,500);
        return()=>{window.removeEventListener("storage",handler);clearInterval(tick);};
      },[]);

      // Build context function for AI (always reads latest state)
      ctxRef.current=()=>buildAIContext({
        schedules,fixedList,todos:todosList,dailyTpls,ddays,weekKey,weekDates,today
      });

      function applyAIActions(actions){
        const log=[];
        let curSch=schedules.slice();
        let curTodos=todosList.slice();
        let curFixed=fixedList.slice();
        let dirty=false,fixedDirty=false,todoDirty=false;
        actions.forEach(a=>{
          if(a.type==="add_schedule"||a.type==="add"){
            const ss=Math.max(START_SLOT,Math.min(END_SLOT-1,Number(a.startSlot)));
            const es=Math.max(ss+1,Math.min(END_SLOT,Number(a.endSlot)));
            const day=Math.max(0,Math.min(6,Number(a.day)));
            const stype=(a.scheduleType==="fixed"||a.type==="add_fixed")?"fixed":"onetime";
            const colorIdx=(curSch.length+curFixed.length)%COLORS.length;
            if(stype==="fixed"){
              const fItem={id:Date.now()+Math.random(),day,startSlot:ss,endSlot:es,name:a.name||"새 일정",color:a.color||COLORS[colorIdx].bg,memo:a.memo||""};
              curFixed=[...curFixed,fItem];
              const wItem={...fItem,type:"fixed",weekKey,priority:a.priority||"medium",createdAt:Date.now()};
              curSch=[...curSch,wItem];
              fixedDirty=true;dirty=true;
              log.push(`✅ 고정 추가: ${a.name} · ${DAYS[day]} ${s2d(ss)}-${s2d(es)}`);
            } else {
              const item={id:Date.now()+Math.random(),day,startSlot:ss,endSlot:es,name:a.name||"새 일정",type:"onetime",color:a.color||COLORS[colorIdx].bg,memo:a.memo||"",priority:a.priority||"medium",weekKey,createdAt:Date.now()};
              curSch=[...curSch,item];
              dirty=true;
              log.push(`✅ 임시 추가: ${a.name} · ${DAYS[day]} ${s2d(ss)}-${s2d(es)}${a.priority?` (${a.priority})`:""}`);
            }
          } else if(a.type==="add_todo"){
            const t={id:Date.now()+Math.random(),text:a.text||"새 할 일",done:false,color:TC[curTodos.length%TC.length]};
            curTodos=[...curTodos,t];todoDirty=true;
            log.push(`✅ To Do 추가: ${a.text}`);
          } else if(a.type==="remove_schedule"){
            const before=curSch.length;
            curSch=curSch.filter(s=>s.name!==a.scheduleName);
            curFixed=curFixed.filter(s=>s.name!==a.scheduleName);
            if(curSch.length!==before){dirty=true;fixedDirty=true;log.push(`🗑️ 삭제: ${a.scheduleName}`);}
          }
        });
        if(dirty){
          // Run auto-arrange to resolve conflicts
          const {schedules:rearranged,moved}=autoArrangeOneTime(curSch);
          setSchedules(rearranged);sto.set(STORAGE_KEY,JSON.stringify(rearranged));
          moved.forEach(m=>{
            log.push(`🔀 재배치: ${m.name}${m.dayChanged?` → ${DAYS[m.day]}요일`:""} ${s2d(m.to)}부터`);
          });
        }
        if(fixedDirty){setFixedList(curFixed);sto.set(FIXED_KEY,JSON.stringify(curFixed));}
        if(todoDirty){setTodosList(curTodos);sto.set(TODO_KEY,JSON.stringify(curTodos));}
        return log;
      }

      function openAdd(day,vi){
        const as=vi+START_SLOT;
        setForm({name:"",startSlot:as,endSlot:Math.min(as+2,END_SLOT),type:"onetime",color:COLORS[0].bg,memo:""});
        setModal({mode:"add",day});
      }
      function handleAdd(){
        if(!form.name.trim())return;
        const item={id:Date.now()+Math.random(),day:modal.day,startSlot:Number(form.startSlot),endSlot:Number(form.endSlot),name:form.name.trim(),type:form.type,color:form.color,memo:form.memo||"",weekKey};
        if(form.type==="fixed"){
          // Add to fixed list AND weekly
          const fItem={id:item.id,day:item.day,startSlot:item.startSlot,endSlot:item.endSlot,name:item.name,color:item.color,memo:item.memo};
          saveFixed([...fixedList,fItem]);
        } else {
          saveSch([...schedules,item]);
        }
        setModal(null);
      }
      function openDetail(s){
        setForm({name:s.name,startSlot:s.startSlot,endSlot:s.endSlot,type:s.type,color:s.color,memo:s.memo||""});

                }} style={{flex:1,padding:"10px",borderRadius:"8px",background:"#4F7CF7",color:"#fff",border:"none",cursor:"pointer",fontSize:"13px",fontWeight:"600"}}>{"연결하기"}</button>
                :<React.Fragment>
                  <button onClick={async function(){setSyncMsg("동기화 중...");await cloudPull();window.location.reload();}} style={{flex:1,padding:"10px",borderRadius:"8px",background:"#4F7CF7",color:"#fff",border:"none",cursor:"pointer",fontSize:"13px"}}>{"지금 동기화"}</button>
                  <button onClick={function(){setCloudKey("");setCloudBin("");localStorage.removeItem(CLOUD_KEY_LS);localStorage.removeItem(CLOUD_BIN_LS);setSyncMsg("");}} style={{padding:"10px",borderRadius:"8px",background:"var(--bg2)",color:"var(--tx1)",border:"1px solid var(--bd2)",cursor:"pointer",fontSize:"13px"}}>{"연결 해제"}</button>
                </React.Fragment>}
                <button onClick={function(){setCloudModal(false);}} style={{padding:"10px",borderRadius:"8px",background:"var(--bg2)",color:"var(--tx1)",border:"1px solid var(--bd2)",cursor:"pointer",fontSize:"13px"}}>{"닫기"}</button>
              </div>
              {syncMsg&&<p style={{fontSize:"11px",color:"var(--tx2)",marginTop:"8px",textAlign:"center"}}>{syncMsg}</p>}
              {cloudBin&&<div style={{marginTop:"14px",padding:"12px",background:"var(--bg2)",borderRadius:"8px"}}>
                <p style={{fontSize:"13px",color:"var(--tx1)",margin:"0 0 8px",fontWeight:"600"}}>{"🔗 동기화 링크"}</p>
                <p style={{fontSize:"12px",color:"var(--tx2)",margin:"0 0 8px",lineHeight:"1.5"}}>{"아래 링크를 다른 기기 브라우저에 붙여넣으면 자동 동기화됩니다."}</p>
                <div style={{display:"flex",gap:"6px"}}>
                  <input value={makeSyncURL()||""} readOnly style={{flex:1,padding:"8px",borderRadius:"6px",border:"1px solid var(--bd2)",background:"var(--bg1)",color:"var(--tx1)",fontSize:"11px"}}/>
                  <button onClick={function(){var u=makeSyncURL();if(u&&navigator.clipboard){navigator.clipboard.writeText(u);setSyncMsg("링크 복사됨!");}}} style={{padding:"8px 12px",borderRadius:"6px",background:"#4F7CF7",color:"#fff",border:"none",cursor:"pointer",fontSize:"12px",fontWeight:"600",whiteSpace:"nowrap"}}>{"복사"}</button>
                </div>
              </div>}
            </div>
          </div>}
          {aiModal&&<div onClick={()=>setAiModal(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}}>
            <div onClick={e=>e.stopPropagation()} style={{background:"var(--bg1)",borderRadius:"16px",padding:"22px",width:"460px",maxWidth:"100%",maxHeight:"90vh",overflowY:"auto",border:"1px solid var(--bd2)"}}>
              <h3 style={{margin:"0 0 6px",fontSize:"16px",color:"var(--tx1)"}}>{"🤖 AI 어시스턴트 설정"}</h3>
              <p style={{fontSize:"12px",color:"var(--tx2)",margin:"0 0 14px",lineHeight:"1.6"}}>
                {"OpenAI(GPT) 또는 Anthropic(Claude) API 키를 입력하면 AI가 일정·할 일을 자연어로 관리해줍니다. 모델 선택에 맞춰 자동으로 해당 키가 사용됩니다."}<br/>
                <span style={{color:"var(--tx3)"}}>{"※ 키는 이 브라우저에만 저장되며 해당 회사 API에만 직접 전송됩니다."}</span>
              </p>

              <label style={{fontSize:"12px",fontWeight:"600",color:"var(--tx2)",display:"block",marginBottom:"4px"}}>{"OpenAI API 키 (GPT용)"}</label>
              <input value={aiKey} onChange={e=>setAiKey(e.target.value)} type="password" placeholder="sk-..." style={{width:"100%",padding:"10px",borderRadius:"8px",border:"1px solid var(--bd2)",background:"var(--bg2)",color:"var(--tx1)",fontSize:"13px",marginBottom:"4px"}}/>
              <p style={{fontSize:"10px",color:"var(--tx3)",margin:"0 0 12px"}}>{"platform.openai.com → API Keys"}</p>

              <label style={{fontSize:"12px",fontWeight:"600",color:"var(--tx2)",display:"block",marginBottom:"4px"}}>{"Anthropic API 키 (Claude용)"}</label>
              <input value={aiAntKey} onChange={e=>setAiAntKey(e.target.value)} type="password" placeholder="sk-ant-..." style={{width:"100%",padding:"10px",borderRadius:"8px",border:"1px solid var(--bd2)",background:"var(--bg2)",color:"var(--tx1)",fontSize:"13px",marginBottom:"4px"}}/>
              <p style={{fontSize:"10px",color:"var(--tx3)",margin:"0 0 14px"}}>{"console.anthropic.com → API Keys"}</p>

              <label style={{fontSize:"12px",fontWeight:"600",color:"var(--tx2)",display:"block",marginBottom:"4px"}}>{"사용할 모델"}</label>
              <select value={aiModel} onChange={e=>setAiModel(e.target.value)} style={{width:"100%",padding:"10px",borderRadius:"8px",border:"1px solid var(--bd2)",background:"var(--bg2)",color:"var(--tx1)",fontSize:"13px",marginBottom:"6px",cursor:"pointer"}}>
                <optgroup label="Anthropic Claude (최신)">
                  <option value="claude-opus-4-7">{"claude-opus-4-7 (최상위)"}</option>
                  <option value="claude-opus-4-6">{"claude-opus-4-6"}</option>
                  <option value="claude-sonnet-4-6">{"claude-sonnet-4-6 (균형)"}</option>
                  <option value="claude-haiku-4-5-20251001">{"claude-haiku-4-5 (빠름·저렴)"}</option>
                </optgroup>
                <optgroup label="OpenAI GPT (최신)">
                  <option value="gpt-5.5">{"gpt-5.5 (최상위)"}</option>
                  <option value="chat-latest">{"chat-latest = GPT-5.5 Instant"}</option>
                  <option value="gpt-5.1">{"gpt-5.1"}</option>
                  <option value="gpt-5">{"gpt-5"}</option>
                </optgroup>
                <optgroup label="OpenAI GPT (저렴)">
                  <option value="gpt-4o">{"gpt-4o"}</option>
                  <option value="gpt-4o-mini">{"gpt-4o-mini (가장 저렴)"}</option>
                </optgroup>
              </select>
              <p style={{fontSize:"11px",color:getAIProvider(aiModel)==="anthropic"?"#10B981":"#4F7CF7",margin:"0 0 16px",fontWeight:"500"}}>
                {getAIProvider(aiModel)==="anthropic"?"→ Anthropic API 키 사용":"→ OpenAI API 키 사용"}
              </p>

              <div style={{display:"flex",gap:"8px"}}>
                <button onClick={()=>{
                  if(!aiKey.trim()&&!aiAntKey.trim()){alert("최소 한 개의 API 키를 입력해주세요.");return;}
                  if(aiKey.trim())localStorage.setItem(AI_KEY_LS,aiKey.trim());else localStorage.removeItem(AI_KEY_LS);
                  if(aiAntKey.trim())localStorage.setItem(AI_ANT_KEY_LS,aiAntKey.trim());else localStorage.removeItem(AI_ANT_KEY_LS);
                  localStorage.setItem(AI_MODEL_LS,aiModel);
                  setAiModal(false);
                }} style={{flex:1,padding:"10px",borderRadius:"8px",background:"#4F7CF7",color:"#fff",border:"none",cursor:"pointer",fontSize:"13px",fontWeight:"600"}}>{"저장"}</button>
                <button onClick={()=>{
                  if(confirm("저장된 모든 API 키를 삭제할까요?")){
                    localStorage.removeItem(AI_KEY_LS);localStorage.removeItem(AI_ANT_KEY_LS);
                    setAiKey("");setAiAntKey("");
                  }
                }} style={{padding:"10px 14px",borderRadius:"8px",background:"var(--bg2)",color:"var(--tx1)",border:"1px solid var(--bd2)",cursor:"pointer",fontSize:"13px"}}>{"키 삭제"}</button>
                <button onClick={()=>setAiModal(false)} style={{padding:"10px 14px",borderRadius:"8px",background:"var(--bg2)",color:"var(--tx1)",border:"1px solid var(--bd2)",cursor:"pointer",fontSize:"13px"}}>{"닫기"}</button>
              </div>
            </div>
          </div>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
